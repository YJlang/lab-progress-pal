name: Deploy to inclab.cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SSH_HOST: back.sku-sku.com
      SSH_USER: ubuntu
      REMOTE_DIR: /home/ubuntu/lab-progress-pal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ghptyqnpjppzhnnzzqxu
        run: bun run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ship dist, runtime, and dep manifest to EC2
        run: |
          tar -czf - dist/client dist/server deploy-server.mjs package.json bun.lock | \
            ssh "$SSH_USER@$SSH_HOST" "cd $REMOTE_DIR && rm -rf dist/client dist/server && tar -xzf -"

      - name: Install/refresh production deps on server
        # Idempotent: no-op when bun.lock matches what's installed (a few seconds).
        # When deps change, picks up new packages so the server bundle can import them.
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "cd $REMOTE_DIR && ~/.bun/bin/bun install --production --frozen-lockfile"

      - name: Restart bun process
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash <<'EOSSH'
            set -e
            cd /home/ubuntu/lab-progress-pal
            if [ -f lab-progress-pal.pid ]; then
              OLD_PID=$(cat lab-progress-pal.pid)
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                kill "$OLD_PID"
                # wait up to 5s for graceful exit
                for _ in 1 2 3 4 5; do
                  ps -p "$OLD_PID" > /dev/null 2>&1 || break
                  sleep 1
                done
                ps -p "$OLD_PID" > /dev/null 2>&1 && kill -9 "$OLD_PID" || true
              fi
            fi
            nohup ~/.bun/bin/bun deploy-server.mjs > nohup.out 2>&1 &
            NEW_PID=$!
            echo "$NEW_PID" > lab-progress-pal.pid
            sleep 3
            ps -p "$NEW_PID" -o pid,etime,cmd
          EOSSH

      - name: Smoke test internal (port 8085 via SSH)
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            'curl -sf -o /dev/null -w "internal 8085: %{http_code} time=%{time_total}s\n" http://127.0.0.1:8085/'

      - name: Smoke test public (https://inclab.cloud)
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null https://inclab.cloud/; then
              echo "public OK on attempt $i"
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            sleep 3
          done
          echo "public smoke test failed after 5 attempts"
          exit 1
